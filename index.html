<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dress the Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blush: #f5e6e0;
    --blush-mid: #e8c9be;
    --blush-deep: #c9907e;
    --clay: #b06b57;
    --cream: #faf6f2;
    --sand: #ede5dc;
    --warm-white: #fdfaf7;
    --text-dark: #2e1f1a;
    --text-mid: #7a5248;
    --text-light: #b08880;
    --sage: #8fa68e;
    --sage-light: #d8e4d6;
    --stone: #c4b8b0;
    --font-serif: 'Cormorant Garamond', Georgia, serif;
    --font-sans: 'DM Sans', system-ui, sans-serif;
  }

  body {
    font-family: var(--font-sans);
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 180px;
  }

  header {
    padding: 2.5rem 2rem 1.5rem;
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .logo {
    font-family: var(--font-serif);
    font-size: 2.6rem;
    font-weight: 300;
    color: var(--text-dark);
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .logo span {
    color: var(--clay);
    font-style: italic;
  }

  .tagline {
    font-size: 0.78rem;
    color: var(--text-light);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
    margin-top: 0.35rem;
  }

  .controls {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 2rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
  }

  .zip-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: white;
    border: 1.5px solid var(--blush-mid);
    border-radius: 50px;
    padding: 0.45rem 1rem 0.45rem 1.2rem;
    flex: 1;
    min-width: 200px;
    max-width: 280px;
    transition: border-color 0.2s;
  }

  .zip-group:focus-within {
    border-color: var(--clay);
  }

  .zip-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-light);
    white-space: nowrap;
    font-weight: 500;
  }

  .zip-input {
    border: none;
    outline: none;
    font-family: var(--font-sans);
    font-size: 0.95rem;
    color: var(--text-dark);
    background: transparent;
    width: 90px;
    font-weight: 400;
  }

  .zip-input::placeholder { color: var(--stone); }

  .lookup-btn {
    background: var(--clay);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 0.55rem 1.4rem;
    font-family: var(--font-sans);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .lookup-btn:hover { background: #9e5c49; }
  .lookup-btn:active { transform: scale(0.97); }

  .date-strip {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 2rem 1.5rem;
    display: flex;
    gap: 0.4rem;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .date-strip::-webkit-scrollbar { display: none; }

  .date-chip {
    flex-shrink: 0;
    background: white;
    border: 1.5px solid var(--blush-mid);
    border-radius: 50px;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    font-family: var(--font-sans);
    font-size: 0.78rem;
    color: var(--text-mid);
    transition: all 0.18s;
    text-align: center;
    line-height: 1.4;
  }

  .date-chip .chip-day { font-weight: 500; display: block; }
  .date-chip .chip-date { color: var(--text-light); font-size: 0.7rem; display: block; }

  .date-chip:hover { border-color: var(--blush-deep); color: var(--clay); }

  .date-chip.active {
    background: var(--clay);
    border-color: var(--clay);
    color: white;
  }

  .date-chip.active .chip-date { color: rgba(255,255,255,0.7); }

  .divider {
    max-width: 780px;
    margin: 0 auto 1.5rem;
    padding: 0 2rem;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blush-mid), transparent);
  }

  .card-area {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 2rem 3rem;
  }

  .outfit-card {
    background: white;
    border-radius: 24px;
    border: 1px solid var(--blush-mid);
    overflow: hidden;
    display: none;
  }

  .outfit-card.visible { display: block; }

  .card-top {
    background: var(--blush);
    padding: 1.8rem 2rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .card-top::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: var(--blush-mid);
    opacity: 0.4;
  }

  .card-top::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 60px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: var(--blush-deep);
    opacity: 0.08;
  }

  .weather-row {
    display: flex;
    align-items: flex-start;
    gap: 1.5rem;
    position: relative;
    z-index: 1;
  }

  .temp-block {}

  .temp-main {
    font-family: var(--font-serif);
    font-size: 4rem;
    font-weight: 300;
    color: var(--text-dark);
    line-height: 1;
  }

  .temp-unit {
    font-size: 1.6rem;
    color: var(--text-mid);
    vertical-align: super;
  }

  .temp-range {
    font-size: 0.8rem;
    color: var(--text-mid);
    margin-top: 0.2rem;
    letter-spacing: 0.04em;
  }

  .weather-details {
    flex: 1;
    padding-top: 0.4rem;
  }

  .weather-condition {
    font-family: var(--font-serif);
    font-size: 1.4rem;
    font-style: italic;
    color: var(--text-dark);
    font-weight: 400;
    line-height: 1.2;
  }

  .weather-meta {
    display: flex;
    gap: 1rem;
    margin-top: 0.6rem;
    flex-wrap: wrap;
  }

  .meta-pill {
    font-size: 0.72rem;
    color: var(--text-mid);
    background: rgba(255,255,255,0.6);
    border-radius: 20px;
    padding: 0.25rem 0.7rem;
    letter-spacing: 0.04em;
  }

  .weather-emoji {
    font-size: 3rem;
    position: relative;
    z-index: 1;
    margin-top: 0.2rem;
    filter: none;
  }

  .card-body {
    padding: 1.8rem 2rem;
  }

  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-light);
    font-weight: 500;
    margin-bottom: 1rem;
  }

  .outfit-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.8rem;
  }

  .outfit-item {
    background: var(--cream);
    border: 1px solid var(--sand);
    border-radius: 16px;
    padding: 1rem 0.9rem;
    position: relative;
  }

  .item-category {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 0.35rem;
  }

  .item-name {
    font-family: var(--font-serif);
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text-dark);
    line-height: 1.3;
  }

  .item-detail {
    font-size: 0.73rem;
    color: var(--text-mid);
    margin-top: 0.25rem;
    line-height: 1.4;
  }

  .item-icon {
    font-size: 1.3rem;
    margin-bottom: 0.4rem;
    display: block;
  }

  .tip-box {
    background: var(--sage-light);
    border-radius: 14px;
    padding: 1rem 1.2rem;
    border: 1px solid #c2d4c0;
  }

  .tip-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
    font-weight: 500;
    margin-bottom: 0.3rem;
  }

  .tip-text {
    font-size: 0.88rem;
    color: #4a6349;
    line-height: 1.55;
    font-style: italic;
    font-family: var(--font-serif);
  }

  .vibe-strip {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .vibe-tag {
    font-size: 0.75rem;
    background: var(--blush);
    color: var(--clay);
    border-radius: 20px;
    padding: 0.3rem 0.85rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    border: 1px solid var(--blush-mid);
  }

  .loading-state, .empty-state {
    text-align: center;
    padding: 4rem 2rem;
  }

  .loading-state p, .empty-state p {
    font-family: var(--font-serif);
    font-size: 1.3rem;
    font-style: italic;
    color: var(--text-light);
    margin-top: 0.5rem;
  }

  .loading-state .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--blush-mid);
    border-top-color: var(--clay);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: #fdf0ed;
    border: 1px solid #f0c4b8;
    border-radius: 12px;
    padding: 1rem 1.2rem;
    font-size: 0.85rem;
    color: var(--clay);
    margin: 0 2rem 1.5rem;
    max-width: 740px;
    margin-left: auto;
    margin-right: auto;
    display: none;
  }

  .error-msg.visible { display: block; }

  .location-display {
    max-width: 780px;
    margin: 0 auto 0.5rem;
    padding: 0 2rem;
    font-size: 0.8rem;
    color: var(--text-light);
    letter-spacing: 0.05em;
  }

  @media (max-width: 600px) {
    .logo { font-size: 2rem; }
    .temp-main { font-size: 3rem; }
    header, .controls, .date-strip, .card-area { padding-left: 1rem; padding-right: 1rem; }
    .card-body { padding: 1.2rem; }
    .card-top { padding: 1.2rem; }
  }
</style>
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<header>
  <div class="logo">dress the <span>weather</span></div>
  <div class="tagline">your daily outfit, curated by the sky</div>
</header>

<div class="controls">
  <div class="zip-group">
    <span class="zip-label">Zip</span>
    <input class="zip-input" id="zipInput" type="text" maxlength="5" placeholder="10001" inputmode="numeric" />
  </div>
  <button class="lookup-btn" id="lookupBtn">Get forecast</button>
</div>

<div id="errorMsg" class="error-msg"></div>

<div id="locationDisplay" class="location-display"></div>

<div class="date-strip" id="dateStrip"></div>
<div class="divider"></div>

<div class="card-area">
  <div id="loadingState" class="loading-state" style="display:none">
    <div class="spinner"></div>
    <p>reading the skies for you...</p>
  </div>

  <div id="emptyState" class="empty-state">
    <p>enter a zip code to see what to wear</p>
  </div>

  <div id="outfitCard" class="outfit-card"></div>
</div>

<script>

      { icon: '🧣', cat: 'Accessories', name: 'Chunky knit scarf + beanie', detail: 'Go tonal or a pop color here' },
      { icon: '👖', cat: 'Bottoms', name: 'Fleece-lined tights or thermal leggings', detail: 'Under any skirt or as pants' },
      { icon: '👢', cat: 'Shoes', name: 'Insulated knee-high boots', detail: 'Adds warmth + looks intentional' },
      { icon: '🧤', cat: 'Extras', name: 'Gloves & warm socks', detail: 'Do not skip these today' }
    ],
    tip: 'Layer a fitted turtleneck under your coat and tuck slim pants into tall boots — warmth without bulk.'
  },
  cold: {
    range: [21, 40],
    vibes: ['effortless layers', 'soft textures', 'winter classic'],
    items: [
      { icon: '🧥', cat: 'Outer layer', name: 'Wool or teddy coat', detail: 'Longline keeps legs warmer' },
      { icon: '👚', cat: 'Top', name: 'Fitted turtleneck or ribbed top', detail: 'Merino wool if you have it' },
      { icon: '👖', cat: 'Bottoms', name: 'Straight-leg jeans or midi skirt with tights', detail: 'Opaque 60–80 denier tights' },
      { icon: '👢', cat: 'Shoes', name: 'Chelsea or lug-sole boots', detail: 'Ankle or knee, both work' },
      { icon: '🧣', cat: 'Accessories', name: 'Soft scarf or beret', detail: 'A finishing touch worth having' }
    ],
    tip: 'Try tucking a ribbed turtleneck into high-waisted trousers under your coat — minimal effort, very put-together.'
  },
  chilly: {
    range: [41, 55],
    vibes: ['transitional dressing', 'relaxed layers', 'casual cool'],
    items: [
      { icon: '🧥', cat: 'Outer layer', name: 'Trench coat or denim jacket', detail: 'Trench for polish, denim for ease' },
      { icon: '👚', cat: 'Top', name: 'Lightweight sweater or long sleeve', detail: 'Slightly oversized reads effortless' },
      { icon: '👖', cat: 'Bottoms', name: 'Straight jeans, trousers, or midi skirt', detail: 'With thin tights if going bare-legged feels too cold' },
      { icon: '👟', cat: 'Shoes', name: 'White sneakers, loafers, or ankle boots', detail: 'All three are right for this weather' },
      { icon: '👜', cat: 'Bag', name: 'Structured tote or small shoulder bag', detail: 'Something that holds a light layer' }
    ],
    tip: 'A relaxed-fit knit over wide-leg jeans tucked into chunky loafers is the perfect easy-cool look for this temperature.'
  },
  mild: {
    range: [56, 68],
    vibes: ['light & breezy', 'spring-ready', 'easy femininity'],
    items: [
      { icon: '👗', cat: 'Dress or top', name: 'Linen shirt dress or floral midi', detail: 'Soft fabrics shine in mild weather' },
      { icon: '🧥', cat: 'Light layer', name: 'Lightweight cardigan or blazer', detail: 'Tie around your waist when warm enough' },
      { icon: '👖', cat: 'Alternative', name: 'Relaxed trousers + a simple tee', detail: 'Linen or cotton blends are ideal' },
      { icon: '👡', cat: 'Shoes', name: 'Ballet flats, mules, or low block heels', detail: 'Keep it effortless' },
      { icon: '🕶️', cat: 'Accessories', name: 'Sunglasses + small crossbody', detail: 'Minimal and put-together' }
    ],
    tip: 'This is the sweet spot for a midi dress with a cardigan knotted at the waist and mules — classic, feminine, done.'
  },
  warm: {
    range: [69, 80],
    vibes: ['warm & relaxed', 'fresh summer ease', 'minimal layers'],
    items: [
      { icon: '👗', cat: 'Main outfit', name: 'Sundress, slip dress, or linen co-ord', detail: 'Breathable fabrics are key' },
      { icon: '👚', cat: 'Optional top', name: 'Cropped tee, tank, or breezy blouse', detail: 'With loose trousers or a skirt' },
      { icon: '🩴', cat: 'Shoes', name: 'Strappy sandals, espadrilles, or sneakers', detail: 'Bare legs or not, both are great' },
      { icon: '👜', cat: 'Bag', name: 'Raffia tote or simple bucket bag', detail: 'Seasonal and practical' },
      { icon: '🕶️', cat: 'Must-have', name: 'Sunglasses + SPF', detail: 'Non-negotiable for days like this' }
    ],
    tip: 'A breezy linen set or a simple slip dress with sandals and a straw bag is the outfit of this temperature — no overthinking needed.'
  },
  hot: {
    range: [81, 95],
    vibes: ['barely-there layers', 'summer maximalist', 'light & airy'],
    items: [
      { icon: '👗', cat: 'Main outfit', name: 'Breezy maxi dress or linen shorts set', detail: 'Loose silhouettes keep you coolest' },
      { icon: '👙', cat: 'Alternative', name: 'Crop top + wide-leg linen pants', detail: 'Stylish and still comfortable in the heat' },
      { icon: '🩴', cat: 'Shoes', name: 'Flat sandals or slides', detail: 'Let your feet breathe today' },
      { icon: '🧴', cat: 'Essential', name: 'SPF + a hat', detail: 'A wide brim straw hat is always chic' },
      { icon: '👜', cat: 'Bag', name: 'Mini bag or small canvas tote', detail: 'Less to carry in the heat' }
    ],
    tip: 'When it\'s truly hot, fabric is everything — reach for linen, cotton, or gauze. A floaty maxi dress does more than any other piece.'
  },
  scorching: {
    range: [96, Infinity],
    vibes: ['heat-survival chic', 'minimal & breathable', 'effortless cool'],
    items: [
      { icon: '👗', cat: 'Main outfit', name: 'Loose linen or gauze maxi dress', detail: 'Maximum airflow, maximum elegance' },
      { icon: '🩱', cat: 'Alternative', name: 'Breezy crop top + flowing wide-leg pants', detail: 'Avoid anything that clings' },
      { icon: '🩴', cat: 'Shoes', name: 'Flat strappy sandals', detail: 'Closed-toe will be uncomfortable' },
      { icon: '🎩', cat: 'Must-have', name: 'Wide-brim hat + sunglasses', detail: 'Function and fashion both covered' },
      { icon: '💧', cat: 'Practical', name: 'Hydration + light fabrics only', detail: 'No synthetics today — natural fibers only' }
    ],
    tip: 'On a scorching day, think resort wear: a flowing linen dress, flat sandals, a wide-brim hat, and minimal accessories. Heat makes editing easy.'
  }
};

const RAIN_OVERRIDE = {
  vibes: ['rain-ready', 'inclement chic', 'covered & cute'],
  extra: { icon: '☂️', cat: 'Rain essential', name: 'Waterproof layers or a stylish rain jacket', detail: 'A trench doubles as a rain coat beautifully' },
  footwear: { icon: '🥾', cat: 'Shoes swap', name: 'Waterproof ankle boots or cute rain boots', detail: 'Skip suede and canvas today' },
  tip_suffix: ' Since rain is expected, prioritize a water-resistant outer layer and ankle boots over anything that will get ruined wet.'
};

const SNOW_OVERRIDE = {
  vibes: ['snow day chic', 'winter wonderland', 'cozy & dry'],
  extra: { icon: '🌨️', cat: 'Snow essential', name: 'Insulated waterproof boots', detail: 'Knee-high or ankle, keep feet dry' },
  tip_suffix: ' Snow in the forecast means waterproofing matters — wear your most insulated, waterproof footwear and layer generously.'
};

const CONDITION_EMOJIS = {
  sunny: '☀️', clear: '☀️', 'mostly clear': '🌤️', 'partly cloudy': '⛅',
  'mostly cloudy': '🌥️', overcast: '☁️', fog: '🌫️', drizzle: '🌦️',
  rain: '🌧️', 'heavy rain': '🌧️', snow: '❄️', sleet: '🌨️',
  'thunder': '⛈️', default: '🌡️'
};

function getEmoji(condition) {
  const c = (condition || '').toLowerCase();
  for (const [k, v] of Object.entries(CONDITION_EMOJIS)) {
    if (c.includes(k)) return v;
  }
  return CONDITION_EMOJIS.default;
}

function getTempCategory(tempF) {
  for (const [key, data] of Object.entries(OUTFITS)) {
    if (tempF >= data.range[0] && tempF <= data.range[1]) return key;
  }
  return 'mild';
}

function decodeWMO(code) {
  if (code === 0) return 'Clear';
  if (code === 1) return 'Mostly Clear';
  if (code === 2) return 'Partly Cloudy';
  if (code === 3) return 'Overcast';
  if ([45,48].includes(code)) return 'Fog';
  if ([51,53,55].includes(code)) return 'Drizzle';
  if ([61,63,65].includes(code)) return 'Rain';
  if ([71,73,75].includes(code)) return 'Snow';
  if ([77].includes(code)) return 'Snow Grains';
  if ([80,81,82].includes(code)) return 'Rain Showers';
  if ([85,86].includes(code)) return 'Snow Showers';
  if ([95,96,99].includes(code)) return 'Thunderstorm';
  return 'Variable';
}

function isRainy(condition) {
  const c = (condition || '').toLowerCase();
  return c.includes('rain') || c.includes('drizzle') || c.includes('shower') || c.includes('thunder');
}

function isSnowy(condition) {
  const c = (condition || '').toLowerCase();
  return c.includes('snow') || c.includes('sleet') || c.includes('ice');
}

function celsiusToF(c) { return Math.round(c * 9/5 + 32); }

let forecastData = null;
let selectedDayIndex = 0;

const zipInput = document.getElementById('zipInput');
const lookupBtn = document.getElementById('lookupBtn');
const dateStrip = document.getElementById('dateStrip');
const outfitCard = document.getElementById('outfitCard');
const loadingState = document.getElementById('loadingState');
const emptyState = document.getElementById('emptyState');
const errorMsg = document.getElementById('errorMsg');
const locationDisplay = document.getElementById('locationDisplay');

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
}

function hideError() {
  errorMsg.classList.remove('visible');
}

function showLoading(yes) {
  loadingState.style.display = yes ? 'block' : 'none';
  emptyState.style.display = 'none';
}

function buildDateStrip(days) {
  dateStrip.innerHTML = '';
  days.forEach((d, i) => {
    const dt = new Date(d.date + 'T12:00:00');
    const dayName = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : dt.toLocaleDateString('en-US', { weekday: 'short' });
    const dateStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const chip = document.createElement('button');
    chip.className = 'date-chip' + (i === selectedDayIndex ? ' active' : '');
    chip.innerHTML = `<span class="chip-day">${dayName}</span><span class="chip-date">${dateStr}</span>`;
    chip.addEventListener('click', () => {
      selectedDayIndex = i;
      document.querySelectorAll('.date-chip').forEach((c, j) => c.classList.toggle('active', j === i));
      renderOutfitCard(forecastData[i]);
    });
    dateStrip.appendChild(chip);
  });
}

function renderOutfitCard(day) {
  const tempF = day.tempF;
  const hi = day.hiF;
  const lo = day.loF;
  const condition = day.condition;
  const humidity = day.humidity;
  const wind = day.wind;

  const category = getTempCategory(tempF);
  const outfit = OUTFITS[category];
  let items = [...outfit.items];
  let vibes = [...outfit.vibes];
  let tip = outfit.tip;

  const rainy = isRainy(condition);
  const snowy = isSnowy(condition);

  if (snowy) {
    items = [SNOW_OVERRIDE.extra, ...items.slice(0, -1)];
    vibes = SNOW_OVERRIDE.vibes;
    tip += SNOW_OVERRIDE.tip_suffix;
  } else if (rainy) {
    items = [RAIN_OVERRIDE.extra, RAIN_OVERRIDE.footwear, ...items.slice(0, 3)];
    vibes = RAIN_OVERRIDE.vibes;
    tip += RAIN_OVERRIDE.tip_suffix;
  }

  const emoji = getEmoji(condition);

  outfitCard.innerHTML = `
    <div class="card-top">
      <div class="weather-row">
        <div class="temp-block">
          <div class="temp-main">${tempF}<span class="temp-unit">°F</span></div>
          <div class="temp-range">↑${hi}° ↓${lo}°</div>
        </div>
        <div class="weather-details">
          <div class="weather-condition">${condition}</div>
          <div class="weather-meta">
            <span class="meta-pill">💧 ${humidity}% humidity</span>
            <span class="meta-pill">🌬 ${wind} mph wind</span>
          </div>
        </div>
        <div class="weather-emoji" aria-hidden="true">${emoji}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="section-label">Today's vibe</div>
      <div class="vibe-strip">
        ${vibes.map(v => `<span class="vibe-tag">${v}</span>`).join('')}
      </div>
      <div class="section-label">What to wear</div>
      <div class="outfit-grid">
        ${items.map(item => `
          <div class="outfit-item">
            <span class="item-icon" aria-hidden="true">${item.icon}</span>
            <div class="item-category">${item.cat}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-detail">${item.detail}</div>
          </div>
        `).join('')}
      </div>
      <div class="tip-box">
        <div class="tip-label">✦ style tip</div>
        <div class="tip-text">${tip}</div>
      </div>
    </div>
  `;

  outfitCard.classList.add('visible');
}

async function fetchForecast(zip) {
  hideError();
  showLoading(true);
  outfitCard.classList.remove('visible');

  try {
    const geoRes = await fetch(`https://api.zippopotam.us/us/${zip}`);
    if (!geoRes.ok) throw new Error('ZIP code not found. Please check and try again.');
    const geoData = await geoRes.json();
    const place = geoData.places[0];
    const lat = parseFloat(place.latitude);
    const lon = parseFloat(place.longitude);
    const cityName = `${place['place name']}, ${place['state abbreviation']}`;

    locationDisplay.textContent = `📍 ${cityName}`;

    const weatherRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,windspeed_10m_max,relativehumidity_2m_max,weathercode&timezone=auto&temperature_unit=fahrenheit&windspeed_unit=mph&forecast_days=15`
    );
    if (!weatherRes.ok) throw new Error('Could not load weather data. Please try again.');
    const weatherData = await weatherRes.json();

    const days = weatherData.daily;
    forecastData = days.time.slice(0, 15).map((date, i) => {
      const hi = Math.round(days.temperature_2m_max[i]);
      const lo = Math.round(days.temperature_2m_min[i]);
      const avg = Math.round((hi + lo) / 2);
      const condition = decodeWMO(days.weathercode[i]);
      return {
        date,
        tempF: avg,
        hiF: hi,
        loF: lo,
        condition,
        humidity: days.relativehumidity_2m_max[i] || '--',
        wind: Math.round(days.windspeed_10m_max[i]) || '--',
        precip: days.precipitation_probability_max[i] || 0
      };
    });

    selectedDayIndex = 0;
    buildDateStrip(forecastData);
    showLoading(false);
    renderOutfitCard(forecastData[0]);

  } catch (err) {
    showLoading(false);
    emptyState.style.display = 'block';
    outfitCard.classList.remove('visible');
    locationDisplay.textContent = '';
    showError(err.message || 'Something went wrong. Please try again.');
  }
}

lookupBtn.addEventListener('click', () => {
  const zip = zipInput.value.trim();
  if (!/^\d{5}$/.test(zip)) {
    showError('Please enter a valid 5-digit US ZIP code.');
    return;
  }
  fetchForecast(zip);
});

zipInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') lookupBtn.click();
});
</script>
