<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blush: #f5e6e0;
  --blush-mid: #e8c9be;
  --blush-deep: #c9907e;
  --clay: #b06b57;
  --clay-dark: #9e5c49;
  --cream: #faf6f2;
  --sand: #ede5dc;
  --warm-white: #fdfaf7;
  --text-dark: #2e1f1a;
  --text-mid: #7a5248;
  --text-light: #b08880;
  --sage: #8fa68e;
  --sage-light: #d8e4d6;
  --font-serif: 'Cormorant Garamond', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, sans-serif;
}

body {
  font-family: var(--font-sans);
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  padding-bottom: env(safe-area-inset-bottom);
}

/* HEADER */
.app-header {
  padding: 2.5rem 1.5rem 1rem;
  max-width: 700px;
  margin: 0 auto;
}
.logo {
  font-family: var(--font-serif);
  font-size: 2.4rem;
  font-weight: 300;
  color: var(--text-dark);
  letter-spacing: 0.02em;
  line-height: 1;
}
.logo span { color: var(--clay); font-style: italic; }
.tagline {
  font-size: 0.72rem;
  color: var(--text-light);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-top: 0.3rem;
}

/* CONTROLS PANEL */
.panel {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 1.5rem 1rem;
}

/* ZIP ROW */
.zip-row {
  display: flex;
  gap: 0.6rem;
  align-items: center;
  margin-bottom: 0.75rem;
}
.zip-field {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: white;
  border: 1.5px solid var(--blush-mid);
  border-radius: 50px;
  padding: 0.5rem 1rem 0.5rem 1.2rem;
  flex: 1;
  transition: border-color 0.2s;
}
.zip-field:focus-within { border-color: var(--clay); }
.zip-label-text {
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-light);
  white-space: nowrap;
  font-weight: 500;
}
.zip-input {
  border: none;
  outline: none;
  font-family: var(--font-sans);
  font-size: 0.95rem;
  color: var(--text-dark);
  background: transparent;
  width: 85px;
}
.zip-input::placeholder { color: #d4c4be; }

.home-btn {
  background: var(--blush);
  border: 1.5px solid var(--blush-mid);
  border-radius: 50px;
  padding: 0.5rem 1rem;
  font-size: 0.78rem;
  color: var(--clay);
  cursor: pointer;
  font-family: var(--font-sans);
  font-weight: 500;
  white-space: nowrap;
  transition: all 0.18s;
  display: flex;
  align-items: center;
  gap: 0.35rem;
}
.home-btn:hover { background: var(--blush-mid); }
.home-btn.no-home { opacity: 0.45; cursor: default; }

.set-home-btn {
  background: none;
  border: none;
  font-size: 0.72rem;
  color: var(--text-light);
  cursor: pointer;
  font-family: var(--font-sans);
  text-decoration: underline;
  padding: 0;
  transition: color 0.15s;
}
.set-home-btn:hover { color: var(--clay); }

.go-btn {
  background: var(--clay);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 0.55rem 1.4rem;
  font-family: var(--font-sans);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
}
.go-btn:hover { background: var(--clay-dark); }
.go-btn:active { transform: scale(0.97); }

/* TOGGLE ROWS */
.toggle-row {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.6rem;
  flex-wrap: wrap;
  align-items: center;
}
.toggle-label {
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-light);
  font-weight: 500;
  margin-right: 0.25rem;
  white-space: nowrap;
}
.toggle-chip {
  background: white;
  border: 1.5px solid var(--blush-mid);
  border-radius: 50px;
  padding: 0.38rem 0.9rem;
  font-size: 0.78rem;
  color: var(--text-mid);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: all 0.15s;
  white-space: nowrap;
}
.toggle-chip:hover { border-color: var(--blush-deep); color: var(--clay); }
.toggle-chip.active {
  background: var(--clay);
  border-color: var(--clay);
  color: white;
}
.gender-chip { font-size: 1.1rem; padding: 0.3rem 0.75rem; }

/* DATE STRIP */
.date-strip {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 1.5rem 1rem;
  display: flex;
  gap: 0.4rem;
  overflow-x: auto;
  scrollbar-width: none;
}
.date-strip::-webkit-scrollbar { display: none; }
.date-chip {
  flex-shrink: 0;
  background: white;
  border: 1.5px solid var(--blush-mid);
  border-radius: 50px;
  padding: 0.38rem 0.85rem;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 0.75rem;
  color: var(--text-mid);
  transition: all 0.15s;
  text-align: center;
  line-height: 1.4;
}
.date-chip .chip-day { font-weight: 500; display: block; }
.date-chip .chip-date { color: var(--text-light); font-size: 0.68rem; display: block; }
.date-chip:hover { border-color: var(--blush-deep); color: var(--clay); }
.date-chip.active { background: var(--clay); border-color: var(--clay); color: white; }
.date-chip.active .chip-date { color: rgba(255,255,255,0.7); }

.divider {
  max-width: 700px;
  margin: 0 auto 1.5rem;
  padding: 0 1.5rem;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--blush-mid), transparent);
}

/* CARD */
.card-area {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 1.5rem 3rem;
}

.outfit-card {
  background: white;
  border-radius: 20px;
  border: 1px solid var(--blush-mid);
  overflow: hidden;
  display: none;
  animation: fadeUp 0.35s ease forwards;
}
.outfit-card.visible { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CARD TOP */
.card-top {
  background: var(--blush);
  padding: 1.6rem 1.5rem 1.3rem;
  position: relative;
  overflow: hidden;
}
.card-top::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: var(--blush-mid);
  opacity: 0.3;
}
.weather-row {
  display: flex;
  align-items: flex-start;
  gap: 1.2rem;
  position: relative;
  z-index: 1;
}
.temp-block {}
.temp-main {
  font-family: var(--font-serif);
  font-size: 3.5rem;
  font-weight: 300;
  color: var(--text-dark);
  line-height: 1;
}
.temp-unit { font-size: 1.4rem; color: var(--text-mid); vertical-align: super; }
.temp-feels {
  font-size: 0.75rem;
  color: var(--text-mid);
  margin-top: 0.15rem;
}
.temp-range {
  font-size: 0.75rem;
  color: var(--text-mid);
}
.weather-details { flex: 1; padding-top: 0.3rem; }
.weather-condition {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-style: italic;
  color: var(--text-dark);
  font-weight: 400;
  line-height: 1.2;
}
.weather-meta {
  display: flex;
  gap: 0.6rem;
  margin-top: 0.5rem;
  flex-wrap: wrap;
}
.meta-pill {
  font-size: 0.7rem;
  color: var(--text-mid);
  background: rgba(255,255,255,0.65);
  border-radius: 20px;
  padding: 0.22rem 0.65rem;
}
.uv-pill {
  font-size: 0.7rem;
  border-radius: 20px;
  padding: 0.22rem 0.65rem;
  font-weight: 500;
}
.uv-low { background: rgba(255,255,255,0.65); color: var(--text-mid); }
.uv-moderate { background: #fff3cd; color: #856404; }
.uv-high { background: #ffe0d0; color: #9c3a00; }
.uv-very-high { background: #ffd0d0; color: #8b0000; }
.weather-emoji {
  font-size: 2.6rem;
  position: relative;
  z-index: 1;
  margin-top: 0.2rem;
}

/* CARD BODY */
.card-body { padding: 1.5rem; }
.section-label {
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-light);
  font-weight: 500;
  margin-bottom: 0.85rem;
}

.vibe-strip {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 1.4rem;
}
.vibe-tag {
  font-size: 0.72rem;
  background: var(--blush);
  color: var(--clay);
  border-radius: 20px;
  padding: 0.28rem 0.8rem;
  border: 1px solid var(--blush-mid);
}

.outfit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 0.65rem;
  margin-bottom: 1.4rem;
}
.outfit-item {
  background: var(--cream);
  border: 1px solid var(--sand);
  border-radius: 14px;
  padding: 0.9rem 0.85rem;
}
.item-category {
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 0.3rem;
}
.item-name {
  font-family: var(--font-serif);
  font-size: 1rem;
  font-weight: 400;
  color: var(--text-dark);
  line-height: 1.3;
}
.item-detail {
  font-size: 0.7rem;
  color: var(--text-mid);
  margin-top: 0.22rem;
  line-height: 1.4;
}
.item-icon { font-size: 1.2rem; margin-bottom: 0.35rem; display: block; }

.avoid-box {
  background: #fff5f2;
  border: 1px solid #f0c4b8;
  border-radius: 12px;
  padding: 0.85rem 1rem;
  margin-bottom: 1rem;
}
.avoid-label {
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--blush-deep);
  font-weight: 500;
  margin-bottom: 0.25rem;
}
.avoid-text {
  font-size: 0.83rem;
  color: var(--clay);
  line-height: 1.5;
}

.tip-box {
  background: var(--sage-light);
  border-radius: 12px;
  padding: 0.9rem 1rem;
  border: 1px solid #c2d4c0;
}
.tip-label {
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sage);
  font-weight: 500;
  margin-bottom: 0.25rem;
}
.tip-text {
  font-size: 0.85rem;
  color: #4a6349;
  line-height: 1.55;
  font-style: italic;
  font-family: var(--font-serif);
}

/* STATES */
.loading-state, .empty-state {
  text-align: center;
  padding: 4rem 2rem;
}
.loading-state p, .empty-state p {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  font-style: italic;
  color: var(--text-light);
  margin-top: 0.5rem;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--blush-mid);
  border-top-color: var(--clay);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  background: #fdf0ed;
  border: 1px solid #f0c4b8;
  border-radius: 10px;
  padding: 0.85rem 1rem;
  font-size: 0.83rem;
  color: var(--clay);
  margin: 0 1.5rem 1rem;
  max-width: 655px;
  margin-left: auto;
  margin-right: auto;
  display: none;
}
.error-msg.visible { display: block; }

.location-display {
  max-width: 700px;
  margin: 0 auto 0.4rem;
  padding: 0 1.5rem;
  font-size: 0.75rem;
  color: var(--text-light);
}

/* OFFLINE BANNER */
.offline-banner {
  background: #fff3cd;
  color: #856404;
  text-align: center;
  padding: 0.5rem;
  font-size: 0.78rem;
  display: none;
}
.offline-banner.visible { display: block; }

@media (max-width: 480px) {
  .logo { font-size: 1.9rem; }
  .temp-main { font-size: 2.8rem; }
  .card-body { padding: 1.1rem; }
  .card-top { padding: 1.1rem; }
  .outfit-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div id="offlineBanner" class="offline-banner">You are offline. Showing cached data if available.</div>

<header class="app-header">
  <div class="logo">dress the <span>weather</span></div>
  <div class="tagline">your daily outfit, curated by the sky</div>
</header>

<div class="panel">
  <!-- ZIP ROW -->
  <div class="zip-row">
    <div class="zip-field">
      <span class="zip-label-text">Zip</span>
      <input class="zip-input" id="zipInput" type="text" maxlength="5" placeholder="10001" inputmode="numeric" />
    </div>
    <button class="home-btn no-home" id="homeBtn" title="Load home ZIP">🏠 Home</button>
    <button class="go-btn" id="goBtn">Get forecast</button>
  </div>

  <div style="margin-bottom:0.75rem; display:flex; align-items:center; gap:0.75rem;">
    <button class="set-home-btn" id="setHomeBtn">Set current ZIP as home</button>
    <span id="homeLabel" style="font-size:0.72rem; color:var(--text-light);"></span>
  </div>

  <!-- GENDER TOGGLE -->
  <div class="toggle-row">
    <span class="toggle-label">Style for</span>
    <button class="toggle-chip gender-chip active" data-gender="female" id="genderFemale">💃</button>
    <button class="toggle-chip gender-chip" data-gender="male" id="genderMale">🕺</button>
  </div>

  <!-- STYLE TOGGLE -->
  <div class="toggle-row">
    <span class="toggle-label">Occasion</span>
    <button class="toggle-chip active" data-style="casual">Casual</button>
    <button class="toggle-chip" data-style="professional">Professional</button>
    <button class="toggle-chip" data-style="date-night">Date Night</button>
    <button class="toggle-chip" data-style="vacation">Vacation</button>
    <button class="toggle-chip" data-style="athletic">Athletic</button>
  </div>
</div>

<!-- DATE STRIP -->
<div class="date-strip" id="dateStrip"></div>
<div class="divider"></div>

<div id="errorMsg" class="error-msg"></div>
<div id="locationDisplay" class="location-display"></div>

<div class="card-area">
  <div id="loadingState" class="loading-state" style="display:none">
    <div class="spinner"></div>
    <p>reading the skies...</p>
  </div>
  <div id="emptyState" class="empty-state">
    <p>enter a zip code to see what to wear</p>
  </div>
  <div id="outfitCard" class="outfit-card"></div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
let forecastData = null;
let selectedDayIndex = 0;
let currentGender = 'female';
let currentStyle = 'casual';

// ─── STORAGE ─────────────────────────────────────────────
function saveHomeZip(zip) {
  localStorage.setItem('homeZip', zip);
  updateHomeBtn();
}
function getHomeZip() { return localStorage.getItem('homeZip') || ''; }
function updateHomeBtn() {
  const zip = getHomeZip();
  const btn = document.getElementById('homeBtn');
  const label = document.getElementById('homeLabel');
  if (zip) {
    btn.classList.remove('no-home');
    btn.title = `Load ${zip}`;
    label.textContent = `Home: ${zip}`;
  } else {
    btn.classList.add('no-home');
    label.textContent = '';
  }
}

// ─── OUTFIT DATA ──────────────────────────────────────────

        vibes:['effortless layers','soft textures','winter classic'],
        items:[
          { icon:'🧥', cat:'Outer layer', name:'Wool or teddy coat', detail:'Longline keeps legs warmer' },
          { icon:'👚', cat:'Top', name:'Ribbed turtleneck or chunky knit sweater', detail:'Tuck into your bottoms for a clean line' },
          { icon:'👖', cat:'Bottoms', name:'High-waisted trousers or straight-leg jeans', detail:'Both work equally well here' },

        ],

      chilly: {
        vibes:['transitional dressing','relaxed layers','casual cool'],
        items:[
          { icon:'🧥', cat:'Outer layer', name:'Trench coat or denim jacket', detail:'Trench for polish, denim for ease' },
          { icon:'👚', cat:'Top', name:'Lightweight sweater or relaxed long sleeve', detail:'Slightly oversized reads effortless' },
          { icon:'👖', cat:'Bottoms', name:'Wide-leg jeans or tailored trousers', detail:'Any pant silhouette works at this temp' },
          { icon:'👟', cat:'Shoes', name:'Loafers, ankle boots, or clean sneakers', detail:'All three are right' },
          { icon:'👗', cat:'Dress alt', name:'Midi skirt + tucked knit', detail:'Just as easy, slightly more put-together' }
        ],
        avoid:'Skip suede if there is any chance of rain. Avoid shorts — it will feel colder than it looks.',
        tip:'A relaxed knit tucked into wide-leg jeans with loafers is the effortless formula here.'
      },
      mild: {
        vibes:['light and breezy','spring-ready','easy femininity'],
        items:[
          { icon:'👚', cat:'Top', name:'Fitted tee, linen blouse, or lightweight knit', detail:'Tuck in for a cleaner look' },
          { icon:'👖', cat:'Bottoms', name:'Linen trousers, straight jeans, or midi skirt', detail:'Light fabrics feel best' },
          { icon:'🧥', cat:'Light layer', name:'Cardigan, blazer, or light jacket', detail:'Tie around your waist once it warms' },
          { icon:'👡', cat:'Shoes', name:'Ballet flats, mules, or low block heels', detail:'Keep it effortless' },
          { icon:'👗', cat:'Dress alt', name:'Linen shirt dress or floral midi', detail:'With a light cardigan for cooler moments' }
        ],
        avoid:'You may not need a heavy coat but bring a layer — mornings and evenings can surprise you.',
        tip:'A linen blouse tucked into wide-leg trousers with mules is perfect for this temperature. Easy, feminine, no overthinking.'
      },
      warm: {
        vibes:['warm and relaxed','fresh summer ease','minimal layers'],
        items:[
          { icon:'👚', cat:'Top', name:'Cropped tee, tank, or breezy blouse', detail:'Breathable cotton or linen' },

// ─── WEATHER HELPERS ──────────────────────────────────────
const CONDITION_EMOJIS = { 'clear':' ☀️','sunny':'☀️','mostly clear':'🌤️','partly cloudy':'⛅','mostly cloudy':'🌥️','overcast':'☁️','fog':'🌫️','drizzle':'🌦️','rain':'🌧️','snow':'❄️','thunder':'⛈️' };

function getEmoji(condition) {
  const c = (condition||'').toLowerCase();
  for (const [k,v] of Object.entries(CONDITION_EMOJIS)) { if (c.includes(k)) return v; }
  return '🌡️';
}

function decodeWMO(code) {
  if (code===0) return 'Clear';
  if (code<=2) return 'Partly Cloudy';
  if (code===3) return 'Overcast';
  if (code<=48) return 'Fog';
  if (code<=55) return 'Drizzle';
  if (code<=65) return 'Rain';
  if (code<=77) return 'Snow';
  if (code<=82) return 'Rain Showers';
  if (code<=86) return 'Snow Showers';
  if (code<=99) return 'Thunderstorm';
  return 'Variable';
}

function getTempZone(f) {
  if (f<=20) return 'frigid';
  if (f<=40) return 'cold';
  if (f<=55) return 'chilly';
  if (f<=68) return 'mild';
  if (f<=80) return 'warm';
  if (f<=95) return 'hot';
  return 'scorching';
}

function uvLabel(uv) {
  if (uv==null) return null;
  if (uv<3) return { text:`UV ${uv} — Low`, cls:'uv-low' };
  if (uv<6) return { text:`UV ${uv} — Moderate`, cls:'uv-moderate' };
  if (uv<8) return { text:`UV ${uv} — High`, cls:'uv-high' };
  return { text:`UV ${uv} — Very High`, cls:'uv-very-high' };
}

// ─── DOM REFS ─────────────────────────────────────────────
const zipInput   = document.getElementById('zipInput');
const goBtn      = document.getElementById('goBtn');
const homeBtn    = document.getElementById('homeBtn');
const setHomeBtn = document.getElementById('setHomeBtn');
const dateStrip  = document.getElementById('dateStrip');
const outfitCard = document.getElementById('outfitCard');
const loadingState = document.getElementById('loadingState');
const emptyState   = document.getElementById('emptyState');
const errorMsg     = document.getElementById('errorMsg');
const locationDisplay = document.getElementById('locationDisplay');

// ─── TOGGLE SETUP ────────────────────────────────────────
document.querySelectorAll('[data-gender]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-gender]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentGender = btn.dataset.gender;
    if (forecastData) renderOutfitCard(forecastData[selectedDayIndex]);
  });
});

document.querySelectorAll('[data-style]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-style]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStyle = btn.dataset.style;
    if (forecastData) renderOutfitCard(forecastData[selectedDayIndex]);
  });
});

// ─── HOME ZIP ────────────────────────────────────────────
updateHomeBtn();

setHomeBtn.addEventListener('click', () => {
  const zip = zipInput.value.trim();
  if (/^\d{5}$/.test(zip)) {
    saveHomeZip(zip);
    setHomeBtn.textContent = 'Saved!';
    setTimeout(() => { setHomeBtn.textContent = 'Set current ZIP as home'; }, 2000);
  } else {
    showError('Enter a valid ZIP code first.');
  }
});

homeBtn.addEventListener('click', () => {
  const zip = getHomeZip();
  if (zip) { zipInput.value = zip; fetchForecast(zip); }
});

// ─── BUILD DATE STRIP ────────────────────────────────────
function buildDateStrip(days) {
  dateStrip.innerHTML = '';
  days.forEach((d, i) => {
    const dt = new Date(d.date + 'T12:00:00');
    const dayName = i===0?'Today':i===1?'Tomorrow':dt.toLocaleDateString('en-US',{weekday:'short'});
    const dateStr = dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const chip = document.createElement('button');
    chip.className = 'date-chip' + (i===selectedDayIndex?' active':'');
    chip.innerHTML = `<span class="chip-day">${dayName}</span><span class="chip-date">${dateStr}</span>`;
    chip.addEventListener('click', () => {
      selectedDayIndex = i;
      document.querySelectorAll('.date-chip').forEach((c,j) => c.classList.toggle('active', j===i));
      renderOutfitCard(forecastData[i]);
    });
    dateStrip.appendChild(chip);
  });
}

// ─── RENDER CARD ─────────────────────────────────────────
function renderOutfitCard(day) {
  const zone = getTempZone(day.tempF);
  const genderData = OUTFITS[currentGender] || OUTFITS.female;
  const styleData  = genderData[currentStyle] || genderData.casual;
  const outfit     = styleData[zone] || styleData.mild;

  const emoji = getEmoji(day.condition);
  const uv    = uvLabel(day.uv);

  let metaHTML = `<span class="meta-pill">💧 ${day.humidity}%</span><span class="meta-pill">🌬 ${day.wind} mph</span>`;
  if (uv) metaHTML += `<span class="meta-pill uv-pill ${uv.cls}">${uv.text}</span>`;
  if (day.precip > 20) metaHTML += `<span class="meta-pill">🌂 ${day.precip}% rain</span>`;

  outfitCard.innerHTML = `
    <div class="card-top">
      <div class="weather-row">
        <div class="temp-block">
          <div class="temp-main">${day.tempF}<span class="temp-unit">°F</span></div>
          <div class="temp-feels">Feels like ${day.feelsLike}°</div>
          <div class="temp-range">↑${day.hiF}° ↓${day.loF}°</div>
        </div>
        <div class="weather-details">
          <div class="weather-condition">${day.condition}</div>
          <div class="weather-meta">${metaHTML}</div>
        </div>
        <div class="weather-emoji">${emoji}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="section-label">Today's vibe</div>
      <div class="vibe-strip">${outfit.vibes.map(v=>`<span class="vibe-tag">${v}</span>`).join('')}</div>
      <div class="section-label">What to wear</div>
      <div class="outfit-grid">${outfit.items.map(item=>`
        <div class="outfit-item">
          <span class="item-icon">${item.icon}</span>
          <div class="item-category">${item.cat}</div>
          <div class="item-name">${item.name}</div>
          <div class="item-detail">${item.detail}</div>
        </div>`).join('')}</div>
      <div class="avoid-box">
        <div class="avoid-label">⚠ What to avoid today</div>
        <div class="avoid-text">${outfit.avoid}</div>
      </div>
      <div class="tip-box">
        <div class="tip-label">✦ Style tip</div>
        <div class="tip-text">${outfit.tip}</div>
      </div>
    </div>`;

  outfitCard.classList.add('visible');
  outfitCard.style.animation = 'none';
  void outfitCard.offsetWidth;
  outfitCard.style.animation = '';
}

// ─── FETCH ───────────────────────────────────────────────
function showError(msg) { errorMsg.textContent=msg; errorMsg.classList.add('visible'); }
function hideError() { errorMsg.classList.remove('visible'); }

async function fetchForecast(zip) {
  hideError();
  loadingState.style.display = 'block';
  emptyState.style.display = 'none';
  outfitCard.classList.remove('visible');

  try {
    const geoRes = await fetch(`https://api.zippopotam.us/us/${zip}`);
    if (!geoRes.ok) throw new Error('ZIP code not found. Please check and try again.');
    const geoData = await geoRes.json();
    const place = geoData.places[0];
    const lat = parseFloat(place.latitude);
    const lon = parseFloat(place.longitude);
    locationDisplay.textContent = `📍 ${place['place name']}, ${place['state abbreviation']}`;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min,precipitation_probability_max,wind_speed_10m_max,uv_index_max,relative_humidity_2m_mean&timezone=auto&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=15`;
    const wRes = await fetch(url);
    if (!wRes.ok) throw new Error('Could not load weather data. Please try again.');
    const wData = await wRes.json();
    if (wData.error) throw new Error(wData.reason || 'Weather data error.');

    const d = wData.daily;
    forecastData = d.time.slice(0,15).map((date,i) => {
      const hi = Math.round(d.temperature_2m_max[i]);
      const lo = Math.round(d.temperature_2m_min[i]);
      const feelsHi = Math.round(d.apparent_temperature_max[i]);
      const feelsLo = Math.round(d.apparent_temperature_min[i]);
      return {
        date,
        tempF: Math.round((hi+lo)/2),
        hiF: hi, loF: lo,
        feelsLike: Math.round((feelsHi+feelsLo)/2),
        condition: decodeWMO(d.weather_code[i]),
        humidity: Math.round(d.relative_humidity_2m_mean[i]) || '--',
        wind: Math.round(d.wind_speed_10m_max[i]) || '--',
        precip: d.precipitation_probability_max[i] || 0,
        uv: d.uv_index_max ? Math.round(d.uv_index_max[i]) : null
      };
    });

    selectedDayIndex = 0;
    buildDateStrip(forecastData);
    loadingState.style.display = 'none';
    renderOutfitCard(forecastData[0]);

  } catch(err) {
    loadingState.style.display = 'none';
    emptyState.style.display = 'block';
    outfitCard.classList.remove('visible');
    locationDisplay.textContent = '';
    showError(err.message || 'Something went wrong. Please try again.');
  }
}

goBtn.addEventListener('click', () => {
  const zip = zipInput.value.trim();
  if (!/^\d{5}$/.test(zip)) { showError('Please enter a valid 5-digit US ZIP code.'); return; }
  fetchForecast(zip);
});
zipInput.addEventListener('keydown', e => { if (e.key==='Enter') goBtn.click(); });

// ─── OFFLINE BANNER ──────────────────────────────────────
window.addEventListener('online',  () => document.getElementById('offlineBanner').classList.remove('visible'));
window.addEventListener('offline', () => document.getElementById('offlineBanner').classList.add('visible'));

// ─── SERVICE WORKER ──────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.error);
}
</script>
